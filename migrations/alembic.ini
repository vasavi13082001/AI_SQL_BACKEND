"""Alembic configuration."""
# Configuration file for alembic
# This file is typically auto-generated by alembic init

[alembic]
# path to migration scripts
sqlalchemy.url = driver://user:password@localhost/dbname
script_location = migrations
prepend_sys_path = .
sqlalchemy_module_name = sqlalchemy
pyramids_config_file = development.ini
pyramid_settings_prefix = sqlalchemy.

[loggers]
keys = root,sqlalchemy

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
